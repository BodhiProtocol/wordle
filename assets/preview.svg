<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a2a3a" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Left side: sample game board -->
  <!-- Title above board -->
  <text x="300" y="72" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="22" fill="#6a8fa8" letter-spacing="4" font-weight="500">GUESS · THINK · WIN</text>

  <!-- Row 1: CRANE — all grey (none in LIGHT) -->
  <rect x="100" y="90"  width="72" height="72" rx="6" fill="#3a3a3c"/>
  <text x="136" y="142" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">C</text>
  <rect x="182" y="90"  width="72" height="72" rx="6" fill="#3a3a3c"/>
  <text x="218" y="142" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">R</text>
  <rect x="264" y="90"  width="72" height="72" rx="6" fill="#b59f3b"/>
  <text x="300" y="142" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">A</text>
  <rect x="346" y="90"  width="72" height="72" rx="6" fill="#3a3a3c"/>
  <text x="382" y="142" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">N</text>
  <rect x="428" y="90"  width="72" height="72" rx="6" fill="#3a3a3c"/>
  <text x="464" y="142" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">E</text>

  <!-- Row 2: SLAIT -->
  <rect x="100" y="174" width="72" height="72" rx="6" fill="#3a3a3c"/>
  <text x="136" y="226" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">S</text>
  <rect x="182" y="174" width="72" height="72" rx="6" fill="#538d4e"/>
  <text x="218" y="226" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">L</text>
  <rect x="264" y="174" width="72" height="72" rx="6" fill="#538d4e"/>
  <text x="300" y="226" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">I</text>
  <rect x="346" y="174" width="72" height="72" rx="6" fill="#538d4e"/>
  <text x="382" y="226" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">G</text>
  <rect x="428" y="174" width="72" height="72" rx="6" fill="#b59f3b"/>
  <text x="464" y="226" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">H</text>

  <!-- Row 3: LIGHT — all green (win!) -->
  <rect x="100" y="258" width="72" height="72" rx="6" fill="#538d4e"/>
  <text x="136" y="310" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">L</text>
  <rect x="182" y="258" width="72" height="72" rx="6" fill="#538d4e"/>
  <text x="218" y="310" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">I</text>
  <rect x="264" y="258" width="72" height="72" rx="6" fill="#538d4e"/>
  <text x="300" y="310" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">G</text>
  <rect x="346" y="258" width="72" height="72" rx="6" fill="#538d4e"/>
  <text x="382" y="310" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">H</text>
  <rect x="428" y="258" width="72" height="72" rx="6" fill="#538d4e"/>
  <text x="464" y="310" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="700" fill="#fff">T</text>

  <!-- Empty rows 4-6 -->
  <rect x="100" y="342" width="72" height="72" rx="6" fill="none" stroke="#2a3a4a" stroke-width="2"/>
  <rect x="182" y="342" width="72" height="72" rx="6" fill="none" stroke="#2a3a4a" stroke-width="2"/>
  <rect x="264" y="342" width="72" height="72" rx="6" fill="none" stroke="#2a3a4a" stroke-width="2"/>
  <rect x="346" y="342" width="72" height="72" rx="6" fill="none" stroke="#2a3a4a" stroke-width="2"/>
  <rect x="428" y="342" width="72" height="72" rx="6" fill="none" stroke="#2a3a4a" stroke-width="2"/>

  <rect x="100" y="426" width="72" height="72" rx="6" fill="none" stroke="#1a2a3a" stroke-width="2"/>
  <rect x="182" y="426" width="72" height="72" rx="6" fill="none" stroke="#1a2a3a" stroke-width="2"/>
  <rect x="264" y="426" width="72" height="72" rx="6" fill="none" stroke="#1a2a3a" stroke-width="2"/>
  <rect x="346" y="426" width="72" height="72" rx="6" fill="none" stroke="#1a2a3a" stroke-width="2"/>
  <rect x="428" y="426" width="72" height="72" rx="6" fill="none" stroke="#1a2a3a" stroke-width="2"/>

  <!-- Win message below board -->
  <text x="284" y="540" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="22" fill="#538d4e" font-weight="700">🎉 Impressive! Solved in 3</text>

  <!-- Vertical divider -->
  <line x1="600" y1="60" x2="600" y2="570" stroke="#1e3248" stroke-width="2"/>

  <!-- Right side: Title + info -->
  <!-- WORDLE title -->
  <text x="900" y="180" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="110" font-weight="700" fill="#ffffff" letter-spacing="8">WORDLE</text>

  <!-- Tagline -->
  <text x="900" y="228" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" fill="#6a8fa8" letter-spacing="4" font-weight="500">GUESS · THINK · WIN</text>

  <!-- Separator -->
  <line x1="680" y1="255" x2="1120" y2="255" stroke="#2a3a4a" stroke-width="1.5"/>

  <!-- Mode cards -->
  <!-- Kids -->
  <rect x="680" y="278" width="190" height="110" rx="10" fill="#0d2a18" stroke="#1a4a2e" stroke-width="1.5"/>
  <text x="775" y="318" text-anchor="middle" font-family="system-ui" font-size="28" fill="#fff">🧒</text>
  <text x="775" y="346" text-anchor="middle" font-family="system-ui" font-size="16" fill="#4caf80" font-weight="700">KIDS MODE</text>
  <text x="775" y="366" text-anchor="middle" font-family="system-ui" font-size="12" fill="#4caf80">3 letters · 8 tries · 1 hint</text>

  <!-- Adult -->
  <rect x="886" y="278" width="234" height="110" rx="10" fill="#0a1e35" stroke="#0d2a4a" stroke-width="1.5"/>
  <text x="1003" y="318" text-anchor="middle" font-family="system-ui" font-size="28" fill="#fff">🧠</text>
  <text x="1003" y="346" text-anchor="middle" font-family="system-ui" font-size="16" fill="#5a9fd4" font-weight="700">ADULT MODE</text>
  <text x="1003" y="366" text-anchor="middle" font-family="system-ui" font-size="12" fill="#5a9fd4">5 letters · 6 tries · no mercy</text>

  <!-- Feature pills -->
  <rect x="680" y="412" width="180" height="34" rx="17" fill="#1a2a3a"/>
  <text x="770" y="434" text-anchor="middle" font-family="system-ui" font-size="14" fill="#8ba8c4">📱 Swipe on mobile</text>

  <rect x="874" y="412" width="200" height="34" rx="17" fill="#1a2a3a"/>
  <text x="974" y="434" text-anchor="middle" font-family="system-ui" font-size="14" fill="#8ba8c4">⌨️ Physical keyboard</text>

  <rect x="680" y="458" width="180" height="34" rx="17" fill="#1a2a3a"/>
  <text x="770" y="480" text-anchor="middle" font-family="system-ui" font-size="14" fill="#8ba8c4">🌙 Dark mode</text>

  <rect x="874" y="458" width="200" height="34" rx="17" fill="#1a2a3a"/>
  <text x="974" y="480" text-anchor="middle" font-family="system-ui" font-size="14" fill="#8ba8c4">💾 Works offline</text>

  <!-- Separator -->
  <line x1="680" y1="514" x2="1120" y2="514" stroke="#2a3a4a" stroke-width="1"/>

  <!-- URL + wordmark -->
  <text x="900" y="548" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="16" fill="#4a6a8a" letter-spacing="1">bodhiprotocol.github.io/wordle</text>

  <text font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" y="585" x="900" text-anchor="middle">
    <tspan fill="#ffffff">Bodhi</tspan><tspan fill="#38BDF8"> Protocol</tspan>
    <tspan fill="#4a6a8a" font-size="14" font-weight="400"> · Zero dependencies · MIT Licensed</tspan>
  </text>
</svg>
